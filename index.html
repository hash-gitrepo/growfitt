<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowFitt — Growth Audit</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" href="/favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6632;
    --green-light: #e7f4ea;
    --bg: #f7f8f6;
    --surface: #ffffff;
    --surface2: #f2f4f1;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #5a5c57;
    --text-hint: #8a8c87;
    --danger: #c0392b;
    --danger-bg: #fdf0ef;
    --warning: #b35c00;
    --warning-bg: #fef6ec;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 24px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141614; --surface: #1e211e; --surface2: #262926;
      --border: rgba(255,255,255,0.09); --border-strong: rgba(255,255,255,0.16);
      --text: #e8ebe5; --text-muted: #9aa097; --text-hint: #6a6e68;
      --danger-bg: #2a1614; --warning-bg: #261c0e; --green-light: #0e2217;
    }
  }

  body { font-family: -apple-system,'Segoe UI',system-ui,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  .topbar { width:100%; background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  .logo-mark { width:30px; height:30px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo-mark svg { width:16px; height:16px; }
  .brand-name { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.3px; }
  .brand-name span { color:var(--green); }
  .topbar-right { margin-left:auto; font-size:12px; color:var(--text-hint); }

  .main { width:100%; max-width:680px; padding:32px 16px 80px; }

  .progress-wrap { margin-bottom:28px; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:6px; }
  .progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.4s ease; }

  .chat-area { display:flex; flex-direction:column; gap:14px; margin-bottom:16px; }
  .msg { display:flex; gap:10px; align-items:flex-start; }
  .msg.user { flex-direction:row-reverse; }

  .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex-shrink:0; letter-spacing:0.5px; }
  .avatar.bot { background:var(--green); color:#fff; }
  .avatar.user { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }

  .bubble { max-width:82%; padding:11px 15px; font-size:14.5px; line-height:1.6; }
  .bubble.bot { background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:4px 14px 14px 14px; }
  .bubble.user { background:var(--green); color:#fff; border-radius:14px 4px 14px 14px; }
  .bubble.hint { background:var(--warning-bg); color:var(--warning); border-radius:8px; font-size:12.5px; padding:7px 13px; max-width:88%; border:1px solid rgba(179,92,0,0.15); }

  .quick-replies { display:flex; flex-wrap:wrap; gap:7px; margin:4px 0 8px 40px; }
  .qr-btn { padding:7px 15px; font-size:13px; border:1px solid var(--border-strong); border-radius:var(--radius-pill); background:var(--surface); color:var(--text); cursor:pointer; font-family:inherit; transition:all 0.15s; line-height:1.3; }
  .qr-btn:hover { background:var(--green-light); border-color:var(--green); color:var(--green); }

  /* Slider input card */
  .slider-card { margin:4px 0 8px 40px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; max-width: 92%; }
  .slider-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  .slider-val-display { font-size:32px; font-weight:700; color:var(--green); letter-spacing:-1px; line-height:1; }
  .slider-val-unit { font-size:16px; font-weight:400; color:var(--text-muted); margin-left:2px; }
  .slider-range-label { font-size:12px; color:var(--text-hint); }

  input[type=range] {
    -webkit-appearance:none; appearance:none;
    width:100%; height:6px; border-radius:3px; outline:none; cursor:pointer;
    background: linear-gradient(to right, var(--green) 0%, var(--green) var(--pct, 50%), var(--surface2) var(--pct, 50%), var(--surface2) 100%);
    margin-bottom:14px;
  }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--green); border:3px solid var(--surface); box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }
  input[type=range]::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--green); border:3px solid var(--surface); box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }

  .slider-confirm-btn { width:100%; padding:11px; background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
  .slider-confirm-btn:hover { opacity:0.88; }

  /* Regular text input */
  .input-wrap { background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--radius); display:flex; align-items:flex-end; gap:8px; padding:8px 8px 8px 14px; transition:border-color 0.15s; }
  .input-wrap:focus-within { border-color:var(--green); }
  .input-wrap textarea { flex:1; border:none; background:transparent; resize:none; font-size:14.5px; font-family:inherit; color:var(--text); line-height:1.5; min-height:26px; max-height:100px; overflow-y:auto; outline:none; }
  .input-wrap textarea::placeholder { color:var(--text-hint); }
  .send-btn { width:36px; height:36px; border-radius:50%; background:var(--green); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.15s; }
  .send-btn:hover { opacity:0.85; }
  .send-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .send-btn svg { width:15px; height:15px; fill:#fff; }

  .typing { display:flex; gap:5px; align-items:center; padding:4px 0; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--text-hint); animation:blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay:0.2s; }
  .dot:nth-child(3) { animation-delay:0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }

  /* Result card */
  .result-card { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-top:4px; box-shadow:0 4px 24px rgba(0,0,0,0.07); }
  .result-header { background:var(--green); color:#fff; padding:20px 22px; }
  .result-header h2 { font-size:17px; font-weight:600; margin-bottom:3px; letter-spacing:-0.3px; }
  .result-header p { font-size:12.5px; opacity:0.75; }
  .result-body { padding:20px 22px; background:var(--surface); }

  .gauge-section { display:flex; align-items:center; gap:24px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .score-num { font-size:44px; font-weight:700; color:var(--text); line-height:1; letter-spacing:-2px; }
  .score-denom { font-size:18px; color:var(--text-muted); font-weight:400; }
  .score-label { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .zone-badge { display:inline-block; padding:4px 14px; border-radius:var(--radius-pill); font-size:12.5px; font-weight:600; margin-top:10px; }
  .zone-fit { background:var(--green-light); color:var(--green); }
  .zone-over { background:var(--danger-bg); color:var(--danger); }
  .zone-under { background:var(--warning-bg); color:var(--warning); }

  .metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
  .metric-tile { background:var(--surface2); border-radius:var(--radius-sm); padding:12px 14px; }
  .metric-tile .label { font-size:11px; color:var(--text-muted); margin-bottom:5px; }
  .metric-tile .value { font-size:20px; font-weight:600; color:var(--text); letter-spacing:-0.5px; }
  .metric-tile .sub { font-size:11px; color:var(--text-hint); margin-top:2px; }

  .section-title { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:12px; }

  .sub-scores { margin-bottom:20px; }
  .sub-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .sub-name { font-size:13px; color:var(--text-muted); width:140px; flex-shrink:0; }
  .bar-track { flex:1; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
  .bar-fill { height:100%; border-radius:3px; background:var(--green); }
  .sub-val { font-size:13px; font-weight:600; color:var(--text); width:32px; text-align:right; }

  .recs { margin-bottom:20px; }
  .rec-item { font-size:13.5px; color:var(--text-muted); line-height:1.55; padding:10px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; }
  .rec-item:last-child { border-bottom:none; }
  .rec-arrow { color:var(--green); font-weight:700; flex-shrink:0; margin-top:1px; }

  .email-section { border-top:1px solid var(--border); padding-top:18px; }
  .email-section .label { font-size:13px; font-weight:500; color:var(--text); margin-bottom:10px; }
  .email-row { display:flex; gap:8px; }
  .email-row input { flex:1; padding:10px 14px; font-size:14px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); font-family:inherit; background:var(--bg); color:var(--text); outline:none; transition:border-color 0.15s; }
  .email-row input:focus { border-color:var(--green); }
  .email-send { padding:10px 20px; background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; white-space:nowrap; transition:opacity 0.15s; min-width:120px; }
  .email-send:hover { opacity:0.88; }
  .email-send:disabled { opacity:0.35; cursor:not-allowed; }
  .sent-msg { font-size:13px; color:var(--green); margin-top:8px; }
  .err-msg { font-size:13px; color:var(--danger); margin-top:8px; }

  .restart-btn { margin-top:16px; padding:9px 20px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); background:transparent; color:var(--text-muted); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; display:block; }
  .restart-btn:hover { background:var(--surface2); color:var(--text); }

  @media (max-width:480px) {
    .metrics-grid { grid-template-columns:repeat(2,1fr); }
    .gauge-section { flex-direction:column; align-items:flex-start; gap:16px; }
    .score-num { font-size:36px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 3L3 21h18L12 3z" fill="white" opacity="0.9"/>
      <path d="M12 9l-3 9h6l-3-9z" fill="#1a6632"/>
    </svg>
  </div>
  <span class="brand-name">Grow<span>Fitt</span></span>
  <span class="topbar-right">Growth Audit Tool · Beta</span>
</div>

<div class="main">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Getting started</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div id="quick-reply-area"></div>
  <div id="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Type your answer..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="handleSend()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const state = { step:0, answers:{}, scores:{}, companyName:'' };

// Slider config for numeric steps
const SLIDERS = {
  growth_rate: { min:0, max:150, step:1, default:30, unit:'%', label:'Revenue growth rate (last 12 months)', hint:'Drag to set your LTM growth rate' },
  nrr:         { min:50, max:200, step:1, default:110, unit:'%', label:'Net Revenue Retention (NRR)', hint:'100% = flat, >100% = expansion' },
  grr:         { min:50, max:100, step:1, default:90, unit:'%', label:'Gross Revenue Retention (GRR)', hint:'Must be 100% or below — excludes upsells' },
  gm:          { min:-20, max:100, step:1, default:70, unit:'%', label:'Gross Margin', hint:'Revenue minus cost of goods sold' },
  fcf:         { min:-100, max:60, step:1, default:5, unit:'%', label:'Free Cash Flow (FCF) margin', hint:'Negative = burning cash, positive = profitable' },
};

const STEPS = [
  { key:'company',       ask:"Hi! I'm your GrowFitt growth audit assistant. Let's assess your growth fitness score — takes about 3 minutes.\n\nWhat's the name of your company?", type:'text' },
  { key:'stage',         ask:(a)=>`Great, ${a.company}! Which growth stage best describes where you are right now?`, type:'choice', choices:['Early (pre-revenue or <$1M ARR)','Growth ($1M–$10M ARR)','Scale ($10M–$50M ARR)','Late ($50M+ ARR)'], hint:'This sets your benchmark growth rate.' },
  { key:'growth_rate',   ask:()=>`What was your revenue growth rate over the last 12 months?`, type:'slider' },
  { key:'nrr',           ask:()=>`What is your Net Revenue Retention (NRR)?<br><span style="font-size:13px;color:var(--text-muted)">This includes upsells and expansions from existing customers.</span>`, type:'slider' },
  { key:'grr',           ask:()=>`What is your Gross Revenue Retention (GRR)?<br><span style="font-size:13px;color:var(--text-muted)">Base revenue retained, excluding upsells — must be 100% or below.</span>`, type:'slider' },
  { key:'gm',            ask:()=>`What is your Gross Margin?<br><span style="font-size:13px;color:var(--text-muted)">Revenue minus cost of goods sold, as a % of revenue.</span>`, type:'slider' },
  { key:'fcf',           ask:()=>`What is your Free Cash Flow (FCF) margin?<br><span style="font-size:13px;color:var(--text-muted)">Negative = burning cash. Positive = profitable.</span>`, type:'slider' },
  { key:'inbound_pct',   ask:()=>`What percentage of new business comes from inbound — organic, referrals, word of mouth?`, type:'choice', choices:['Less than 20% inbound','20–40% inbound','40–60% inbound','60–80% inbound','More than 80% inbound'], hint:'Higher inbound = stronger brand and product pull.' },
  { key:'brand_strength',ask:()=>`How would you describe your brand strength in your target market?`, type:'choice', choices:['Early / barely known','Growing recognition','Well known in our niche','Strong brand with clear pull','Category leader / dominant'] },
  { key:'cohort_trend',  ask:()=>`Last one. How has your retention been trending — last 3 months vs your 12-month average?`, type:'choice', choices:['Sharp decline recently','Material decline','Roughly the same','Slight improvement','Improving significantly'], hint:'Captures whether retention health is getting better or worse.' }
];

const stageMap = {
  'Early (pre-revenue or <$1M ARR)':{bgr:0.80},
  'Growth ($1M–$10M ARR)':{bgr:0.55},
  'Scale ($10M–$50M ARR)':{bgr:0.35},
  'Late ($50M+ ARR)':{bgr:0.25}
};

function lookup(val, table) {
  let score=table[0][1];
  for(let i=0;i<table.length;i++){if(val>=table[i][0])score=table[i][1];}
  return score;
}

function computeScores(a) {
  const growth=parseFloat(a.growth_rate)/100, nrr=parseFloat(a.nrr)/100;
  const grr=parseFloat(a.grr)/100, gm=parseFloat(a.gm)/100, fcf=parseFloat(a.fcf)/100;
  const bgr=(stageMap[a.stage]||{bgr:0.55}).bgr;
  const GRS=lookup(growth,[[0,1],[0.1,2],[0.2,3],[0.3,4],[0.4,5]]);
  const inboundMap={'Less than 20% inbound':2,'20–40% inbound':3,'40–60% inbound':4,'60–80% inbound':4.5,'More than 80% inbound':5};
  const brandMap={'Early / barely known':1.5,'Growing recognition':2.5,'Well known in our niche':3.5,'Strong brand with clear pull':4.5,'Category leader / dominant':5};
  const SQS=Math.min(5,((inboundMap[a.inbound_pct]||3)+(brandMap[a.brand_strength]||3))/2);
  const expansion=nrr-grr;
  const CQS=lookup(expansion,[[0,1],[0.05,2],[0.15,3],[0.25,4],[0.40,5]]);
  const GQS=0.30*GRS+0.30*SQS+0.40*CQS;
  const NRS=lookup(nrr-1,[[-0.5,1],[0,2],[0.05,3],[0.10,4],[0.15,5]]);
  const GRRS=lookup(grr,[[0,1],[0.80,2],[0.85,3],[0.90,4],[0.95,5]]);
  const cohortMap={'Sharp decline recently':1,'Material decline':2,'Roughly the same':3,'Slight improvement':4,'Improving significantly':5};
  const CSS=cohortMap[a.cohort_trend]||3;
  const RS=0.45*NRS+0.35*GRRS+0.20*CSS;
  const GM_Score=lookup(gm,[[0,1],[0.50,2],[0.60,3],[0.70,4],[0.80,5]]);
  const FCF_Score=lookup(fcf,[[-1,1],[0,2],[0.10,3],[0.20,4],[0.30,5]]);
  const ES=0.50*GM_Score+0.50*FCF_Score;
  const GFS=0.30*GQS+0.40*RS+0.30*ES;
  let mfitLow,mfitHigh,interpretation;
  if(GFS<2.5){mfitLow=0.5;mfitHigh=0.7;interpretation='Broken';}
  else if(GFS<3.0){mfitLow=0.7;mfitHigh=0.9;interpretation='Fragile';}
  else if(GFS<3.8){mfitLow=0.9;mfitHigh=1.1;interpretation='Average';}
  else if(GFS<4.5){mfitLow=1.1;mfitHigh=1.35;interpretation='Strong';}
  else{mfitLow=1.4;mfitHigh=1.75;interpretation='Elite';}
  const OGR_Low=bgr*mfitLow, OGR_High=bgr*mfitHigh;
  const zone=growth<OGR_Low?'Under':(growth<=OGR_High?'Fit':'Over');
  return {GFS,GQS,RS,ES,OGR_Low,OGR_High,zone,interpretation,NRS,GRRS,CSS,CQS,GRS,SQS,growth,nrr,grr,gm,fcf,bgr,expansion};
}

function getRecs(s) {
  const r=[];
  if(s.SQS<3.5) r.push('Growth quality is held back by heavy outbound reliance. Invest in inbound channels — content, referrals, and brand building — to reduce CAC and improve source quality.');
  if(s.CQS<3) r.push('Expansion revenue is weak. Strengthen upsell and land-and-expand motions — NRR improvement is the highest-leverage move available to you right now.');
  if(s.GRS<3) r.push('Your growth rate is below sector expectations for your stage. Review pipeline generation and conversion rates — there may be capacity or process constraints.');
  if(s.NRS<3) r.push('Net retention is below the threshold for efficient scaling. Investigate churn drivers with exit interviews and cohort analysis.');
  if(s.GRRS<3) r.push('Gross retention needs attention. Logo churn is eroding your base. Invest in customer success and health scoring before scaling acquisition.');
  if(s.CSS<3) r.push('Recent retention trends are deteriorating — an early warning signal. Act before it compounds into a structural forecast problem.');
  if(s.gm<0.65) r.push('Gross margin is below SaaS benchmarks. Review infrastructure costs, pricing, and delivery efficiency to improve unit economics.');
  if(s.fcf<0.05) r.push('Cash efficiency needs work. Align sales and marketing spend to sustainable payback periods.');
  if(s.zone==='Over') r.push('You are growing faster than your system can sustain. Consolidate operations and improve retention before accelerating further.');
  if(s.zone==='Under') r.push('You have capacity to grow faster without straining the system. Review whether the gap is a pipeline, conversion, or capacity constraint.');
  if(r.length===0) r.push('Your growth system is well-calibrated. Focus on maintaining system fitness as you scale — track GFS quarterly.');
  return r;
}

function updateProgress() {
  const pct=Math.round((state.step/STEPS.length)*100);
  const labels=['Getting started','Company name','Growth stage','Growth rate','Net retention','Gross retention','Gross margin','Cash flow','Growth sources','Brand strength','Retention trend'];
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-text').textContent=labels[Math.min(state.step,labels.length-1)]||'Completing...';
}

function addMsg(html,role){
  const chat=document.getElementById('chat');
  const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML=`<div class="avatar ${role}">${role==='bot'?'GF':'YOU'}</div><div class="bubble ${role}">${html}</div>`;
  chat.appendChild(d); d.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function addHint(text){
  const chat=document.getElementById('chat');
  const d=document.createElement('div'); d.className='msg';
  d.innerHTML=`<div style="width:30px;flex-shrink:0"></div><div class="bubble hint">${text}</div>`;
  chat.appendChild(d);
}

function showTyping(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div'); d.id='typing'; d.className='msg';
  d.innerHTML=`<div class="avatar bot">GF</div><div class="bubble bot"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(d); d.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function removeTyping(){const e=document.getElementById('typing');if(e)e.remove();}

function setQR(choices){
  const area=document.getElementById('quick-reply-area'); area.innerHTML='';
  if(!choices||!choices.length) return;
  const wrap=document.createElement('div'); wrap.className='quick-replies';
  choices.forEach(c=>{
    const btn=document.createElement('button'); btn.className='qr-btn'; btn.textContent=c;
    btn.onclick=()=>submitAnswer(c); wrap.appendChild(btn);
  });
  area.appendChild(wrap);
}

function showSlider(key) {
  const cfg=SLIDERS[key];
  const area=document.getElementById('quick-reply-area');
  area.innerHTML='';
  document.getElementById('user-input').disabled=true;
  document.getElementById('send-btn').disabled=true;

  const card=document.createElement('div');
  card.className='slider-card';
  card.id='slider-card-'+key;

  const sliderId='slider-'+key;
  const displayId='sliderval-'+key;

  card.innerHTML=`
    <div class="slider-top">
      <div>
        <span class="slider-val-display" id="${displayId}">${cfg.default}</span>
        <span class="slider-val-unit">${cfg.unit}</span>
      </div>
      <span class="slider-range-label">${cfg.min}${cfg.unit} – ${cfg.max}${cfg.unit}</span>
    </div>
    <input type="range" id="${sliderId}" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${cfg.default}">
    <button class="slider-confirm-btn" onclick="confirmSlider('${key}')">Confirm ${cfg.default}${cfg.unit} →</button>
  `;
  area.appendChild(card);

  const slider=document.getElementById(sliderId);
  const display=document.getElementById(displayId);
  const btn=card.querySelector('.slider-confirm-btn');

  function updateSlider() {
    const val=parseInt(slider.value);
    display.textContent=val;
    btn.textContent=`Confirm ${val}${cfg.unit} →`;
    const pct=((val-cfg.min)/(cfg.max-cfg.min)*100).toFixed(1)+'%';
    slider.style.setProperty('--pct', pct);
  }

  slider.addEventListener('input', updateSlider);
  updateSlider();
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function confirmSlider(key) {
  const slider=document.getElementById('slider-'+key);
  const val=slider.value;
  document.getElementById('quick-reply-area').innerHTML='';
  addMsg(val+SLIDERS[key].unit, 'user');
  state.answers[key]=val;
  state.step++; updateProgress();
  setTimeout(()=>askStep(state.step),380);
}

function askStep(idx){
  const step=STEPS[idx]; if(!step){showResults();return;}
  const q=typeof step.ask==='function'?step.ask(state.answers):step.ask;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg(q.replace(/\n/g,'<br>'),'bot');
    if(step.type==='slider'){
      if(SLIDERS[step.key]&&SLIDERS[step.key].hint) addHint(SLIDERS[step.key].hint);
      showSlider(step.key);
    } else if(step.type==='choice'){
      if(step.hint) addHint(step.hint);
      setQR(step.choices);
      document.getElementById('user-input').disabled=true;
      document.getElementById('send-btn').disabled=true;
    } else {
      setQR([]);
      document.getElementById('user-input').disabled=false;
      document.getElementById('send-btn').disabled=false;
      setTimeout(()=>document.getElementById('user-input').focus(),50);
    }
  },650);
}

function submitAnswer(val){
  const step=STEPS[state.step]; if(!step) return;
  if(step.validate){const err=step.validate(val);if(err){addMsg(err,'bot');return;}}
  document.getElementById('quick-reply-area').innerHTML='';
  document.getElementById('user-input').value='';
  addMsg(val,'user');
  state.answers[step.key]=val;
  if(step.key==='company') state.companyName=val;
  state.step++; updateProgress();
  setTimeout(()=>askStep(state.step),380);
}

function handleSend(){
  const v=document.getElementById('user-input').value.trim(); if(v) submitAnswer(v);
}

function drawGauge(canvasId,gfs){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H-10,r=H-20;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI);
  ctx.strokeStyle='#e0e5df'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();
  const pct=Math.min(1,Math.max(0,gfs/5));
  const col=gfs<2.5?'#c0392b':gfs<3.0?'#e07b00':gfs<3.8?'#639922':'#1a6632';
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,Math.PI+pct*Math.PI);
  ctx.strokeStyle=col; ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();
  const nx=cx+r*Math.cos(Math.PI+pct*Math.PI),ny=cy+r*Math.sin(Math.PI+pct*Math.PI);
  ctx.beginPath(); ctx.arc(nx,ny,5,0,2*Math.PI); ctx.fillStyle=col; ctx.fill();
}

async function sendEmail(){
  const email=document.getElementById('email-input').value.trim();
  const btn=document.getElementById('email-btn');
  const status=document.getElementById('email-status');
  if(!email||!email.includes('@')){status.innerHTML='<div class="err-msg">Please enter a valid email address.</div>';return;}
  btn.disabled=true; btn.textContent='Sending...'; status.innerHTML='';
  const s=state.scores;
  const payload={
    to:email, companyName:state.companyName,
    scores:{
      GFS:s.GFS,GQS:s.GQS,RS:s.RS,ES:s.ES,
      OGR_Low:s.OGR_Low,OGR_High:s.OGR_High,
      zone:s.zone,interpretation:s.interpretation,
      growth:s.growth,nrr:s.nrr,grr:s.grr,gm:s.gm,fcf:s.fcf,
      expansion:s.expansion, recommendations:getRecs(s)
    }
  };
  try {
    const res=await fetch('/.netlify/functions/send-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(res.ok&&data.success){
      status.innerHTML='<div class="sent-msg">✓ Report sent successfully to '+email+'</div>';
      btn.textContent='Sent ✓';
    } else { throw new Error(data.error||'Unknown error'); }
  } catch(err){
    status.innerHTML='<div class="err-msg">Failed to send: '+err.message+'</div>';
    btn.disabled=false; btn.textContent='Send report';
  }
}

function showResults(){
  const s=computeScores(state.answers); state.scores=s;
  document.getElementById('quick-reply-area').innerHTML='';
  document.getElementById('user-input').disabled=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('input-area').style.display='none';
  document.getElementById('progress-text').textContent='Assessment complete';
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-pct').textContent='100%';
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg(`Assessment complete. ${state.companyName}'s Growth Fitness Score is <strong>${s.GFS.toFixed(2)}/5.00</strong> — <strong>${s.interpretation}</strong>.`,'bot');
    const chat=document.getElementById('chat');
    const zoneClass=s.zone==='Fit'?'zone-fit':s.zone==='Over'?'zone-over':'zone-under';
    const recs=getRecs(s);
    const recHtml=recs.map(r=>`<div class="rec-item"><span class="rec-arrow">→</span><span>${r}</span></div>`).join('');
    const card=document.createElement('div'); card.className='result-card';
    card.innerHTML=`
      <div class="result-header">
        <h2>GrowFitt Growth Audit — ${state.companyName}</h2>
        <p>Generated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div class="result-body">
        <div class="gauge-section">
          <canvas id="gauge-canvas" width="160" height="90"></canvas>
          <div>
            <div><span class="score-num">${s.GFS.toFixed(2)}</span><span class="score-denom">/5.00</span></div>
            <div class="score-label">Growth Fitness Score</div>
            <div class="zone-badge ${zoneClass}">${s.interpretation} · ${s.zone} zone</div>
          </div>
        </div>
        <div class="section-title">Key metrics</div>
        <div class="metrics-grid">
          <div class="metric-tile"><div class="label">Optimal growth range</div><div class="value">${(s.OGR_Low*100).toFixed(0)}–${(s.OGR_High*100).toFixed(0)}%</div><div class="sub">System can sustain</div></div>
          <div class="metric-tile"><div class="label">Current growth rate</div><div class="value">${(s.growth*100).toFixed(0)}%</div><div class="sub">${s.zone==='Fit'?'Within fit range':s.zone==='Over'?'Above fit range':'Below fit range'}</div></div>
          <div class="metric-tile"><div class="label">Expansion ratio</div><div class="value">${(s.expansion*100).toFixed(0)}pp</div><div class="sub">NRR − GRR spread</div></div>
        </div>
        <div class="section-title" style="margin-top:18px">Component scores</div>
        <div class="sub-scores">
          <div class="sub-row"><span class="sub-name">Growth quality (GQS)</span><div class="bar-track"><div class="bar-fill" style="width:${(s.GQS/5*100).toFixed(0)}%"></div></div><span class="sub-val">${s.GQS.toFixed(1)}</span></div>
          <div class="sub-row"><span class="sub-name">Retention score (RS)</span><div class="bar-track"><div class="bar-fill" style="width:${(s.RS/5*100).toFixed(0)}%"></div></div><span class="sub-val">${s.RS.toFixed(1)}</span></div>
          <div class="sub-row"><span class="sub-name">Efficiency score (ES)</span><div class="bar-track"><div class="bar-fill" style="width:${(s.ES/5*100).toFixed(0)}%"></div></div><span class="sub-val">${s.ES.toFixed(1)}</span></div>
        </div>
        <div class="section-title">Recommendations</div>
        <div class="recs">${recHtml}</div>
        <div class="email-section">
          <div class="label">Send this report to the prospect</div>
          <div class="email-row">
            <input type="email" id="email-input" placeholder="prospect@company.com" />
            <button class="email-send" id="email-btn" onclick="sendEmail()">Send report</button>
          </div>
          <div id="email-status"></div>
        </div>
        <button class="restart-btn" onclick="restart()">↺ Start new audit</button>
      </div>`;
    chat.appendChild(card); card.scrollIntoView({behavior:'smooth',block:'nearest'});
    setTimeout(()=>drawGauge('gauge-canvas',s.GFS),120);
  },900);
}

function restart(){
  state.step=0; state.answers={}; state.scores={}; state.companyName='';
  document.getElementById('chat').innerHTML='';
  document.getElementById('quick-reply-area').innerHTML='';
  document.getElementById('input-area').style.display='block';
  document.getElementById('user-input').disabled=false;
  document.getElementById('send-btn').disabled=false;
  updateProgress(); askStep(0);
}

document.getElementById('user-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});

updateProgress(); askStep(0);
</script>
</body>
